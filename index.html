<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0efe9;
    --border: #e2e0d8; --border2: #cccab8;
    --text: #1a1917; --text2: #6b6960; --text3: #a09d92;
    --purple: #4a42b0; --purple-light: #eeedfc; --purple-text: #3730a3;
    --green: #2d7d55; --green-light: #e8f5ef; --green-text: #1a5c3a;
    --red: #b93333; --red-light: #fceaea; --red-text: #8b2020;
    --amber: #9a6200; --amber-light: #fdf3dc; --amber-text: #7a4d00;
    --teal: #0d6e5a; --teal-light: #e0f5ef; --teal-text: #085043;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--text3); }
  .sync-badge { margin-left: auto; font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--surface2); color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .sync-badge.ok { background: var(--teal-light); color: var(--teal-text); }
  .sync-badge.err { background: var(--red-light); color: var(--red-text); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .view-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .vt { font-size: 13px; padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .vt.on { background: var(--text); color: #fff; border-color: var(--text); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 14px; align-items: center; }
  .fl { font-size: 11px; color: var(--text3); margin-right: 2px; flex-shrink: 0; }
  .sep { width: 1px; height: 14px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
  .fb { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .fb.on { background: var(--purple); color: #fff; border-color: var(--purple); }
  .fb:hover:not(.on) { border-color: var(--purple); color: var(--purple); }

  .stats { display: flex; gap: 14px; padding: 10px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); flex-wrap: wrap; }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .main { max-width: 680px; margin: 0 auto; padding: 16px 16px 40px; }

  .date-sec { margin-bottom: 22px; }
  .date-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 0 2px; }
  .date-lbl { font-size: 14px; font-weight: 700; color: var(--text); }
  .date-count { font-size: 11px; color: var(--text3); }
  .date-line { flex: 1; height: 1px; background: var(--border); }

  /* ---- LIST VIEW ---- */
  .ec { border-radius: 10px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 6px; transition: border-color .15s; overflow: hidden; }
  .ec.s-applied { border-color: var(--purple); }
  .ec.s-waitlisted { border-color: var(--amber); }
  .ec.s-attended { border-color: var(--teal); }
  .ec-head { display: flex; gap: 10px; align-items: stretch; padding: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .ec.s-applied .ec-head { background: #faf9ff; }
  .ec.s-waitlisted .ec-head { background: #fffdf5; }
  .ec.s-attended .ec-head { background: #f3fbf8; }
  .ec.s-attended .etitle { color: var(--text2); }

  .tblk { min-width: 78px; text-align: right; flex-shrink: 0; }
  .ttime { font-size: 12px; color: var(--text2); line-height: 1.5; font-variant-numeric: tabular-nums; }
  .tdur { font-size: 10px; color: var(--text3); }
  .treg { font-size: 10px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
  .vdiv { width: 1px; background: var(--border); flex-shrink: 0; }
  .ebody { flex: 1; min-width: 0; }
  .etitle-row { display: flex; align-items: flex-start; gap: 6px; }
  .etitle { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 3px; word-break: keep-all; flex: 1; }
  .caret { font-size: 11px; color: var(--text3); transition: transform .2s; flex-shrink: 0; margin-top: 2px; }
  .ec.open .caret { transform: rotate(180deg); }
  .edesc { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .emeta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; align-items: center; }

  .badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
  .b-type { background: var(--purple-light); color: var(--purple-text); }
  .b-open { background: var(--green-light); color: var(--green-text); }
  .b-full { background: var(--red-light); color: var(--red-text); }

  .togs { display: flex; gap: 6px; margin-left: 4px; }
  .tog { font-size: 11px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .tog.on-applied { background: var(--purple); border-color: var(--purple); color: #fff; }
  .tog.on-waitlisted { background: var(--amber); border-color: var(--amber); color: #fff; }
  .tog.on-attended { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* ---- DETAIL PANEL ---- */
  .ec-detail { display: none; padding: 0 12px 14px; border-top: 1px solid var(--border); margin-top: -1px; }
  .ec.open .ec-detail { display: block; }
  .det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
  .det-cell { background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
  .det-cell.full { grid-column: 1 / -1; }
  .det-k { font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 2px; }
  .det-v { font-size: 12px; color: var(--text); line-height: 1.5; white-space: pre-line; }
  .memo-wrap { margin-top: 12px; }
  .memo-label { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
  .memo-area { width: 100%; min-height: 60px; border: 1px solid var(--border2); border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: inherit; color: var(--text); background: var(--surface); resize: vertical; line-height: 1.5; }
  .memo-area:focus { outline: none; border-color: var(--purple); }
  .memo-status { font-size: 10px; color: var(--text3); margin-top: 4px; height: 12px; }

  .empty { text-align: center; color: var(--text3); font-size: 13px; padding: 40px 20px; }

  .dl-wrap { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .dl-btn { font-size: 12px; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
  .dl-btn:hover { border-color: var(--purple); color: var(--purple); }
  .dl-btn svg { width: 13px; height: 13px; }

  /* ---- TIMELINE VIEW ---- */
  .tl-wrap { position: relative; margin-left: 2px; }
  .tl-area { position: relative; margin-left: 42px; border-left: 1.5px solid var(--border); }
  .tl-hour { position: absolute; left: -42px; width: 38px; text-align: right; font-size: 10px; color: var(--text3); transform: translateY(-50%); font-variant-numeric: tabular-nums; }
  .tl-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--border); opacity: 0.6; }
  .tl-block { position: absolute; border-radius: 6px; padding: 4px 7px; overflow: hidden; font-size: 11px; line-height: 1.3; border: 1px solid transparent; }
  .tl-block.b-none { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
  .tl-block.b-applied { background: var(--purple-light); color: var(--purple-text); border-color: var(--purple); }
  .tl-block.b-waitlisted { background: var(--amber-light); color: var(--amber-text); border-color: var(--amber); }
  .tl-block.b-attended { background: var(--teal-light); color: var(--teal-text); border-color: var(--teal); }
  .tl-block .bt { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-block .btm { font-size: 9px; opacity: 0.8; font-variant-numeric: tabular-nums; }
  .tl-legend { display: flex; gap: 12px; font-size: 11px; color: var(--text2); margin-bottom: 14px; flex-wrap: wrap; }
  .tl-legend span { display: flex; align-items: center; gap: 4px; }
  .lg-dot { width: 10px; height: 10px; border-radius: 3px; border: 1px solid; }

  @media (max-width: 480px) {
    .header { padding: 14px 14px 0; }
    .main { padding: 12px 10px 40px; }
    .tblk { min-width: 66px; }
    .ec-head { padding: 10px; gap: 8px; }
    .etitle { font-size: 12px; }
    .det-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

let state = {};
let memoTimers = {};
let fType = "all", fStatus = "all", view = "timeline";
let openCards = {};

function setSync(s, t) {
  const b = document.getElementById("sync-badge");
  b.className = "sync-badge" + (s ? " " + s : "");
  document.getElementById("sync-text").textContent = t;
}

async function loadState() {
  try {
    const { data, error } = await sb.from("edu_checks").select("edu_key, applied, attended, waitlisted, memo");
    if (error) throw error;
    state = {};
    data.forEach(r => { state[r.edu_key] = { applied: !!r.applied, attended: !!r.attended, waitlisted: !!r.waitlisted, memo: r.memo || "" }; });
    setSync("ok", "동기화됨");
  } catch (e) {
    console.error("불러오기 실패:", e);
    setSync("err", "연결 실패");
  }
}

async function saveState(key, st) {
  try {
    const { error } = await sb.from("edu_checks")
      .upsert({ edu_key: key, applied: st.applied, attended: st.attended, waitlisted: st.waitlisted, memo: st.memo, updated_at: new Date().toISOString() });
    if (error) throw error;
    setSync("ok", "동기화됨");
    return true;
  } catch (e) {
    console.error("저장 실패:", e);
    setSync("err", "저장 실패");
    return false;
  }
}

function getKey(e) { return e.date + "_" + e.time + "_" + e.title.slice(0,10); }

function effState(e) {
  const k = getKey(e);
  if (state[k]) return state[k];
  return { applied: e.date.startsWith("07") && e.status !== "full", waitlisted: e.date.startsWith("07") && e.status === "full", attended: false, memo: "" };
}

function ensureState(e) {
  const k = getKey(e);
  if (!state[k]) state[k] = { ...effState(e) };
  return state[k];
}

function toggle(e, field) {
  const cur = ensureState(e);
  cur[field] = !cur[field];
  saveState(getKey(e), cur);
}

function getDow(ds) {
  const [m,d] = ds.split(".").map(Number);
  return ["일","월","화","수","목","금","토"][new Date(YEAR,m-1,d).getDay()];
}
function toMin(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function getDur(s,e) { const mins = toMin(e)-toMin(s); return mins >= 60 ? mins/60+"h" : mins+"m"; }

function statusBadge(st) {
  if(st==="full") return '<span class="badge b-full">정원마감</span>';
  return '<span class="badge b-open">모집중</span>';
}
function stateClass(s) {
  if (s.attended) return "s-attended";
  if (s.applied) return "s-applied";
  if (s.waitlisted) return "s-waitlisted";
  return "";
}
function blockClass(s) {
  if (s.attended) return "b-attended";
  if (s.applied) return "b-applied";
  if (s.waitlisted) return "b-waitlisted";
  return "b-none";
}

function filtered() {
  return DATA.filter(e => {
    const tm = fType === "all" || e.type === fType;
    let sm = true;
    if (fStatus !== "all") {
      const s = effState(e);
      if (fStatus === "applied") sm = s.applied;
      else if (fStatus === "waitlisted") sm = s.waitlisted;
      else if (fStatus === "attended") sm = s.attended;
      else if (fStatus === "none") sm = !s.applied && !s.attended && !s.waitlisted;
    }
    return tm && sm;
  });
}

function updateStats() {
  const total = DATA.length;
  let nA=0, nW=0, nAt=0;
  DATA.forEach(e => { const s = effState(e); if(s.attended) nAt++; else if(s.applied) nA++; else if(s.waitlisted) nW++; });
  document.getElementById("stats-bar").innerHTML =
    `<span class="stat-item"><span class="stat-dot" style="background:#cccab8"></span>전체 ${total}개</span>` +
    `<span class="stat-item"><span class="stat-dot" style="background:#4a42b0"></span>신청 ${nA}개</span>` +
    `<span class="stat-item"><span class="stat-dot" style="background:#9a6200"></span>대기 ${nW}개</span>` +
    `<span class="stat-item"><span class="stat-dot" style="background:#0d6e5a"></span>수강 ${nAt}개</span>`;
}

function groupByDate(items) {
  const by = {};
  items.forEach(e => { if(!by[e.date]) by[e.date] = []; by[e.date].push(e); });
  return by;
}

function detailHTML(e) {
  let cells = "";
  cells += `<div class="det-cell"><div class="det-k">교육기간</div><div class="det-v">${e.date} ${e.time} ~ ${e.end}</div></div>`;
  cells += `<div class="det-cell"><div class="det-k">강사</div><div class="det-v">${e.teacher || "-"}</div></div>`;
  cells += `<div class="det-cell"><div class="det-k">교육장소</div><div class="det-v">${e.place || "-"}</div></div>`;
  cells += `<div class="det-cell"><div class="det-k">교육비</div><div class="det-v">무료</div></div>`;
  if (e.target) cells += `<div class="det-cell full"><div class="det-k">추천대상</div><div class="det-v">${e.target}</div></div>`;
  cells += `<div class="det-cell full"><div class="det-k">강의요약</div><div class="det-v">${e.summary}</div></div>`;
  if (e.topics) cells += `<div class="det-cell full"><div class="det-k">세부주제</div><div class="det-v">${e.topics}</div></div>`;
  const k = getKey(e);
  const memo = (state[k] && state[k].memo) || "";
  return `<div class="ec-detail">
    <div class="det-grid">${cells}</div>
    <div class="memo-wrap">
      <div class="memo-label">📝 내 메모</div>
      <textarea class="memo-area" data-key="${k}" placeholder="이 강의에 대한 메모를 남겨보세요">${memo}</textarea>
      <div class="memo-status" data-memo-status="${k}"></div>
    </div>
  </div>`;
}

/* ---------- LIST VIEW ---------- */
function renderList(root) {
  const by = groupByDate(filtered());
  let html = "";
  Object.keys(by).sort().forEach(date => {
    const items = by[date].sort((a,b) => a.time.localeCompare(b.time));
    const [mo, dy] = date.split(".");
    html += `<div class="date-sec"><div class="date-hdr"><span class="date-lbl">${mo}.${dy} (${getDow(date)})</span><span class="date-count">${items.length}개</span><div class="date-line"></div></div>`;
    items.forEach(e => {
      const k = getKey(e), s = effState(e);
      const isOpen = openCards[k];
      html += `<div class="ec ${stateClass(s)}${isOpen?" open":""}" data-key="${k}">
        <div class="ec-head" data-head="${k}">
          <div class="tblk">
            <div class="ttime">${e.time}<br>${e.end}</div>
            <div class="tdur">${getDur(e.time,e.end)}</div>
            <div class="treg">신청<br>${e.reg}</div>
          </div>
          <div class="vdiv"></div>
          <div class="ebody">
            <div class="etitle-row"><div class="etitle">${e.title}</div><span class="caret">▾</span></div>
            <div class="emeta">
              <span class="badge b-type">${e.type==="특강"?"오픈특강":"오픈랩"}</span>
              ${statusBadge(e.status)}
              <div class="togs">
                <button class="tog ${s.applied?"on-applied":""}" data-act="applied">${s.applied?"✓ ":""}신청</button>
                <button class="tog ${s.waitlisted?"on-waitlisted":""}" data-act="waitlisted">${s.waitlisted?"✓ ":""}대기</button>
                <button class="tog ${s.attended?"on-attended":""}" data-act="attended">${s.attended?"✓ ":""}수강</button>
              </div>
            </div>
          </div>
        </div>
        ${detailHTML(e)}
      </div>`;
    });
    html += `</div>`;
  });
  root.innerHTML = html || '<div class="empty">해당 조건의 교육이 없습니다.</div>';

  root.querySelectorAll(".ec").forEach(el => {
    const k = el.dataset.key;
    const e = DATA.find(d => getKey(d) === k);
    el.querySelector(".ec-head").addEventListener("click", (ev) => {
      if (ev.target.closest(".tog")) return;
      openCards[k] = !openCards[k];
      el.classList.toggle("open", openCards[k]);
    });
    el.querySelectorAll(".tog").forEach(btn => {
      btn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        toggle(e, btn.dataset.act);
        const s = effState(e);
        el.className = "ec " + stateClass(s) + (openCards[k]?" open":"");
        btn.parentElement.querySelectorAll(".tog").forEach(b => {
          const act = b.dataset.act;
          b.className = "tog " + (s[act] ? "on-"+act : "");
          b.textContent = (s[act]?"✓ ":"") + (act==="applied"?"신청":act==="waitlisted"?"대기":"수강");
        });
        updateStats();
      });
    });
    const memoArea = el.querySelector(".memo-area");
    if (memoArea) {
      memoArea.addEventListener("click", ev => ev.stopPropagation());
      memoArea.addEventListener("input", () => {
        const cur = ensureState(e);
        cur.memo = memoArea.value;
        const statusEl = el.querySelector(`[data-memo-status="${k}"]`);
        statusEl.textContent = "저장 중...";
        clearTimeout(memoTimers[k]);
        memoTimers[k] = setTimeout(async () => {
          const ok = await saveState(k, cur);
          statusEl.textContent = ok ? "저장됨 ✓" : "저장 실패";
          setTimeout(() => { statusEl.textContent = ""; }, 2000);
        }, 700);
      });
    }
  });
}

/* ---------- TIMELINE VIEW ---------- */
const HOUR_PX = 54, START_H = 9, END_H = 18;

function layoutDay(items) {
  const evs = items.map(e => ({ e, s: toMin(e.time), en: toMin(e.end) }))
    .sort((a,b) => a.s - b.s || a.en - b.en);
  let groups = [], cur = [], curEnd = -1;
  evs.forEach(ev => {
    if (cur.length && ev.s >= curEnd) { groups.push(cur); cur = []; curEnd = -1; }
    cur.push(ev); curEnd = Math.max(curEnd, ev.en);
  });
  if (cur.length) groups.push(cur);
  groups.forEach(g => {
    let cols = [];
    g.forEach(ev => {
      let placed = false;
      for (let i = 0; i < cols.length; i++) {
        if (ev.s >= cols[i]) { ev.col = i; cols[i] = ev.en; placed = true; break; }
      }
      if (!placed) { ev.col = cols.length; cols.push(ev.en); }
    });
    g.forEach(ev => ev.ncol = cols.length);
  });
  return evs;
}

function renderTimeline(root) {
  const by = groupByDate(filtered());
  const baseMin = START_H * 60;
  const totalPx = (END_H - START_H) * HOUR_PX;
  let html = "";
  Object.keys(by).sort().forEach(date => {
    const [mo, dy] = date.split(".");
    const laid = layoutDay(by[date]);
    html += `<div class="date-sec"><div class="date-hdr"><span class="date-lbl">${mo}.${dy} (${getDow(date)})</span><span class="date-count">${by[date].length}개</span><div class="date-line"></div></div>`;
    html += `<div class="tl-wrap"><div class="tl-area" style="height:${totalPx}px">`;
    for (let h = START_H; h <= END_H; h++) {
      const top = (h - START_H) * HOUR_PX;
      html += `<div class="tl-hour" style="top:${top}px">${String(h).padStart(2,"0")}:00</div>`;
      html += `<div class="tl-line" style="top:${top}px"></div>`;
    }
    laid.forEach(({e, s, en, col, ncol}) => {
      const top = (s - baseMin) / 60 * HOUR_PX;
      const hgt = (en - s) / 60 * HOUR_PX - 3;
      const st = effState(e);
      const leftPct = (col / ncol) * 100;
      const widthPct = (1 / ncol) * 100;
      const narrow = ncol > 1;
      html += `<div class="tl-block ${blockClass(st)}" style="top:${top}px;height:${hgt}px;left:calc(${leftPct}% + 4px);width:calc(${widthPct}% - 8px)">
        <div class="bt" style="${narrow?"font-size:10px":""}">${e.title}</div>
        ${narrow?"":`<div class="btm">${e.time}~${e.end}</div>`}
      </div>`;
    });
    html += `</div></div>`;
  });
  root.innerHTML = (html || '<div class="empty">해당 조건의 교육이 없습니다.</div>') +
    `<div class="tl-legend" style="margin-top:16px">
      <span><span class="lg-dot" style="background:var(--purple-light);border-color:var(--purple)"></span>신청함</span>
      <span><span class="lg-dot" style="background:var(--amber-light);border-color:var(--amber)"></span>대기</span>
      <span><span class="lg-dot" style="background:var(--teal-light);border-color:var(--teal)"></span>수강완료</span>
      <span><span class="lg-dot" style="background:var(--surface2);border-color:var(--border2)"></span>미신청</span>
      <span style="color:var(--text3)">빈 칸 = 비어있는 시간 · 상세/메모는 목록 탭에서</span>
    </div>`;
}

function render() {
  const root = document.getElementById("root");
  if (view === "timeline") renderTimeline(root);
  else renderList(root);
  updateStats();
}

document.querySelectorAll("[data-v]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-v]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on"); view = btn.dataset.v; render();
  });
});
document.querySelectorAll("[data-f]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-f]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on"); fType = btn.dataset.f; render();
  });
});
document.querySelectorAll("[data-s]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-s]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on"); fStatus = btn.dataset.s; render();
  });
});

document.getElementById("dl-btn").addEventListener("click", () => {
  const rows = [["날짜","요일","시작","종료","유형","상태","신청기간","제목","추천대상","강사","장소","강의요약","신청","대기","수강","메모"]];
  DATA.forEach(e => {
    const s = effState(e);
    rows.push([e.date, getDow(e.date), e.time, e.end,
      e.type==="특강"?"오픈특강":"오픈랩", e.status==="full"?"정원마감":"모집중", e.reg,
      e.title, e.target, e.teacher, e.place, e.summary,
      s.applied?"O":"", s.waitlisted?"O":"", s.attended?"O":"", s.memo||""]);
  });
  const csv = "\uFEFF" + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""').replace(/\n/g," ")}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = "바이오교육일정.csv";
  a.click();
});

(async () => { await loadState(); render(); })();
</script>
</body>
</html>
